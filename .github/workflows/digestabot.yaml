name: "Check for newer image versions"

on:
  workflow_dispatch:
  schedule:
    # At the end of every day
    - cron: "0 0 * * *"

jobs:
  digest-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      checks: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: navikt/digestabot@v1.1
        id: digestabot
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          team: teamdagpenger
          create-pr: false

      - name: Create pull request for digest updates
        if: steps.digestabot.outputs.changed_files != ''
        id: create_pull_request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update images digests
          title: Update images digests
          body: Update images digests
          labels: automated pr
          branch: update-digests
          signoff: true
          sign-commits: true
          delete-branch: true
          add-paths: ${{ steps.digestabot.outputs.changed_files }}

      - name: Report check run for auto-merge
        if: steps.create_pull_request.outputs.pull-request-number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          head_sha=$(gh pr view "${{ steps.create_pull_request.outputs.pull-request-number }}" --json headRefOid -q .headRefOid)
          gh api repos/${{ github.repository }}/check-runs \
            -f name="test" \
            -f head_sha="$head_sha" \
            -f status="completed" \
            -f conclusion="success" \
            -f "output[title]=Digest update" \
            -f "output[summary]=Base image digest update - no code changes"

      - name: Enable auto-merge for digest updates
        if: steps.create_pull_request.outputs.pull-request-number
        run: gh pr merge --auto --squash "${{ steps.create_pull_request.outputs.pull-request-number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
